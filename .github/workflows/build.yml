name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: 10.0.x
  APP_PROJECT: ./Lab09_PackagedApp_Fresh.csproj
  TEST_PROJECT: ./Lab09_PackagedApp_Fresh.Tests/Lab09_PackagedApp_Fresh.Tests.csproj
  RID: win-x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore app
        run: dotnet restore ${{ env.APP_PROJECT }} -r ${{ env.RID }}

      - name: Restore tests
        run: dotnet restore ${{ env.TEST_PROJECT }}

      - name: Build app
        run: dotnet build ${{ env.APP_PROJECT }} --configuration Release -r ${{ env.RID }} --no-restore

      - name: Test with coverage
        run: >
          dotnet test ${{ env.TEST_PROJECT }}
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage;Format=Cobertura"
          --results-directory "${{ github.workspace }}/coverage"

      - name: Publish
        run: >
          dotnet publish ${{ env.APP_PROJECT }}
          --configuration Release
          -r ${{ env.RID }}
          --no-build
          --output "${{ github.workspace }}/publish"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: ${{ github.workspace }}/publish
          if-no-files-found: error

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ github.workspace }}/coverage/**/coverage.cobertura.xml
          if-no-files-found: error