name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: 10.0.x
  APP_PROJECT: ./Lab09_PackagedApp_Fresh.csproj
  TEST_PROJECT: ./Lab09_PackagedApp_Fresh.Tests/Lab09_PackagedApp_Fresh.Tests.csproj

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore app
        run: dotnet restore ${{ env.APP_PROJECT }}

      - name: Restore tests
        run: dotnet restore ${{ env.TEST_PROJECT }}

      - name: Build app
        run: dotnet build ${{ env.APP_PROJECT }} --configuration Release --no-restore

      - name: Test with coverage
        run: dotnet test ${{ env.TEST_PROJECT }} --configuration Release --no-restore --collect "XPlat Code Coverage" --results-directory .coverage

      - name: Publish
        run: dotnet publish ${{ env.APP_PROJECT }} --configuration Release --runtime win-x64 --output .publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: .publish

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage/**/coverage.cobertura.xml