name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: 10.0.x
  PROJECT_PATH: ./Lab09_PackagedApp_Fresh.csproj
  TEST_PROJECT: ./Lab09_PackagedApp_Fresh.Tests/Lab09_PackagedApp_Fresh.Tests.csproj

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Test with coverage
        run: dotnet test ${{ env.TEST_PROJECT }} --configuration Release --no-build --collect "XPlat Code Coverage"

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --runtime win-x64 --no-build --output .publish
