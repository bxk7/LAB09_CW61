name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Audyt pakietów NuGet
        shell: pwsh
        run: |
          $out = dotnet list package --vulnerable 2>&1
          if ($out -match "vulnerable packages") {
            Write-Error "Wykryto podatne pakiety! Sprawdź raport."
            Write-Output $out
            exit 1
          }
          Write-Output "Brak znanych podatności."

      - name: Build z analizatorami (SAST)
        run: dotnet build --configuration Release /p:TreatWarningsAsErrors=true

      - name: Generuj SBOM
        shell: pwsh
        run: |
          dotnet tool install --global Microsoft.Sbom.DotNetTool
          sbom-tool generate -b ./bin/Release -bc . -pn SecurityAuditApp -pv 1.0.0 -ps Student

      - name: Upload SBOM jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: '**/manifest.spdx.json'

      - name: Podpisz skrypt PowerShell
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Subject "CN=Lab10StudentDeveloper" `
            -Type CodeSigningCert `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(2)

          Set-AuthenticodeSignature `
            -FilePath ".\deploy.ps1" `
            -Certificate $cert

          $sig = Get-AuthenticodeSignature ".\deploy.ps1"
          Write-Output "Status podpisu: $($sig.Status)"
